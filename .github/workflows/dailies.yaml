name: Madness Dailies Webhook

on:
  schedule:
    # March 9–13 at 2:00 PM PT (21:00 UTC) in 2026
    - cron: "0 21 9-13 3 *"
  workflow_dispatch: # allows manual trigger

jobs:
  send-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run madness dailies program
        working-directory: madness-dailies
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          go mod download
          go run .
